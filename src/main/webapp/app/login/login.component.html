<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <span class="login-icon">🔐</span>
      <h1 data-cy="loginTitle">Autentificare</h1>
      <p>Introduceți credențialele pentru a accesa platforma</p>
    </div>

    @if (authenticationError()) {
      <div class="login-error" data-cy="loginError">
        <strong>Autentificare eșuată!</strong> Verificați credențialele și încercați din nou.
      </div>
    }

    <form class="login-form" (ngSubmit)="login()" [formGroup]="loginForm">
      <div class="form-group">
        <label for="username">Nume utilizator</label>
        <input
          type="text"
          class="form-input"
          name="username"
          id="username"
          #usernameInput
          placeholder="Introduceți numele de utilizator"
          formControlName="username"
          data-cy="username"
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label for="password">Parolă</label>
        <input
          type="password"
          class="form-input"
          name="password"
          id="password"
          placeholder="Introduceți parola"
          formControlName="password"
          data-cy="password"
          autocomplete="current-password"
        />
      </div>
      <div class="form-check-group">
        <label class="check-label">
          <input class="check-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
          <span>Ține-mă minte</span>
        </label>
      </div>
      <button type="submit" class="login-btn" data-cy="submit">Autentificare</button>
    </form>

    <div class="login-footer">
      <a routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector">Ai uitat parola?</a>
      <span class="divider">•</span>
      <a routerLink="/account/register">Creează cont nou</a>
    </div>
  </div>
</div>
